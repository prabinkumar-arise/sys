<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Grow - Interactive Expert Experience</title>
    <style>
        :root {
            --primary-glow: rgba(76, 175, 80, 0.4);
            --card-glass: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0;
            background: #030a03;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation;
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #030a03; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 1.5s ease;
        }
        #explore-btn {
            color: #4CAF50; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 5px;
            animation: pulse 1.5s infinite alternate; border: 2px solid #4CAF50;
            padding: 15px 30px; border-radius: 50px; margin-bottom: 30px;
        }
        #autowrite-container {
            color: #fff; font-family: 'Courier New', monospace; font-size: 1.2rem;
            text-align: center; max-width: 85%; min-height: 60px;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; text-shadow: 0 0 15px #4CAF50; } }

        /* --- Main Content --- */
        #main-content {
            display: none; opacity: 0; flex-direction: column; align-items: center;
            width: 100%; height: 100%; transition: opacity 2s ease;
        }

        #bg-image {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background: url('logo23.jpg') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        /* --- FLOATING ECO GROW TITLE --- */
        .typing-container { 
            margin-top: 8vh; 
            z-index: 10; 
            animation: float 4s ease-in-out infinite; 
        }
        
        h1 { 
            color: #ffffff; 
            font-size: clamp(3rem, 10vw, 5.5rem); 
            text-transform: uppercase; 
            margin: 0; 
            width: 0; 
            overflow: hidden; 
            white-space: nowrap; 
            border-right: 6px solid #4CAF50; 
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }

        .remove-bar { border-right: none !important; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* --- Expert --- */
        .expert-container {
            position: fixed; bottom: -10px; left: -400px;
            display: flex; align-items: flex-end; z-index: 100;
            transition: left 6s cubic-bezier(0.45, 0.05, 0.55, 0.95); 
        }
        .expert-boy { font-size: clamp(110px, 18vw, 160px); filter: drop-shadow(0 10px 20px black); transition: transform 0.5s; }
        .speech-bubble {
            position: absolute; bottom: 200px; left: 120px;
            background: white; color: #222; padding: 15px 20px;
            border-radius: 20px; font-family: 'Arial', sans-serif;
            font-weight: bold; width: 220px; opacity: 0;
            transform: scale(0.8); transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .expert-arrive { left: 30px; }
        .bubble-active { opacity: 1; transform: scale(1); }

        /* Exit Animation to the Right */
        .expert-exit-right { 
            left: 120vw !important; 
            transition: left 4s cubic-bezier(0.55, 0.055, 0.675, 0.19) !important; 
        }
        .expert-exit-right .expert-boy {
            transform: skewX(-10deg); /* Leaning forward as he runs right */
        }

        /* --- 3D Cards --- */
        .plant-sections {
            display: flex; gap: 40px; margin-top: 60px; z-index: 10;
            perspective: 1500px; justify-content: center; flex-wrap: wrap;
        }
        .glass-card {
            position: relative; width: 180px; height: 180px;
            background: var(--card-glass); backdrop-filter: blur(12px); 
            border: 2px solid var(--card-border); border-radius: 25px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d; cursor: pointer; opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .start-cards { animation: slideInLeft 4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .glass-card:active {
            border-color: #4CAF50;
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.7);
            transform: scale(0.92) rotateX(15deg);
        }

        .circular-text {
            position: absolute; width: 100%; height: 100%;
            animation: rotateText 20s linear infinite; transform: translateZ(20px);
            pointer-events: none;
        }
        .circular-text span {
            position: absolute; left: 50%; transform-origin: 0 90px;
            color: #fff; font-size: 0.75rem; font-weight: bold;
        }
        .main-icon { font-size: 4.5rem; transform: translateZ(50px); pointer-events: none; }

        @keyframes rotateText { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-150vw) rotateY(-45deg); }
            100% { opacity: 1; transform: translateX(0) rotateY(0deg); }
        }

        @media (max-width: 768px) {
            .plant-sections { gap: 25px; width: 100vw; overflow-x: auto; justify-content: flex-start; padding: 40px 30px; flex-wrap: nowrap; scroll-snap-type: x mandatory; }
            .glass-card { flex: 0 0 auto; width: 170px; height: 170px; scroll-snap-align: center; }
            .speech-bubble { bottom: 140px; left: 80px; width: 170px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="handleStart()">
        <div id="explore-btn">Tap to Explore</div>
        <div id="autowrite-container"></div>
    </div>

    <div id="main-content">
        <div id="bg-image"></div>

        <div class="expert-container" id="expertContainer">
            <div class="speech-bubble" id="bubble">
                <span id="bubbleText"></span>
            </div>
            <div class="expert-boy">🧍🏻‍♂️</div>
        </div>

        <div class="typing-container">
            <h1 id="main-title">ECO GROW</h1>
        </div>

        <div class="plant-sections">
            <div class="glass-card" onclick="handleNavigation('indoor-plants.html')">
                <div class="circular-text" id="indoorText"></div>
                <div class="main-icon">🏠</div>
            </div>
            <div class="glass-card" onclick="handleNavigation('outdoor-plants.html')">
                <div class="circular-text" id="outdoorText"></div>
                <div class="main-icon">🌳</div>
            </div>
            <div class="glass-card" onclick="handleNavigation('meditation-plants.html')">
                <div class="circular-text" id="medText"></div>
                <div class="main-icon">🧘</div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx;
        let started = false;

        function playSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140 + Math.random() * 60, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function createCircle(id, text) {
            const el = document.getElementById(id);
            text.split("").forEach((char, i) => {
                const s = document.createElement("span");
                s.innerText = char;
                s.style.transform = `rotate(${i * (360/text.length)}deg)`;
                el.appendChild(s);
            });
        }
        createCircle("indoorText", "INDOOR • GROW • FRESH • ");
        createCircle("outdoorText", "OUTDOOR • WILD • NATURE • ");
        createCircle("medText", "ZEN • PEACE • BALANCE • ");

        function handleStart() {
            if(started) return; started = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('explore-btn').style.display = 'none';
            
            let i = 0;
            const msg = "This website made by Prabin. It represents some plants.";
            const target = document.getElementById('autowrite-container');
            
            function type() {
                if (i < msg.length) {
                    target.innerHTML += msg.charAt(i);
                    playSound(); i++; setTimeout(type, 65);
                } else {
                    setTimeout(revealSite, 5000);
                }
            }
            type();
        }

        function revealSite() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'flex';
                
                setTimeout(() => { 
                    main.style.opacity = '1'; 
                    const title = document.getElementById('main-title');
                    title.style.animation = "typing 4s steps(8, end) forwards";
                    
                    setTimeout(() => {
                        title.classList.add('remove-bar');
                    }, 4000);

                    document.querySelectorAll('.glass-card').forEach(c => c.classList.add('start-cards'));
                }, 100);

                setTimeout(() => document.getElementById('expertContainer').classList.add('expert-arrive'), 2000);
                setTimeout(() => {
                    document.getElementById('bubble').classList.add('bubble-active');
                    const welcome = "Namaste! Welcome to Prabin's Eco Grow. Choose a section!";
                    typeWriter("bubbleText", welcome);
                    speak(welcome);
                }, 7500);
            }, 1500);
        }

        function typeWriter(id, text, i = 0) {
            const el = document.getElementById(id);
            if (i === 0) el.innerHTML = "";
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                playSound();
                setTimeout(() => typeWriter(id, text, i + 1), 50); 
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(t);
            s.rate = 0.9; window.speechSynthesis.speak(s);
        }

        function handleNavigation(url) {
            typeWriter("bubbleText", "Excellent! Let's go this way...");
            speak("Excellent! Let's go this way...");
            
            // Wait a moment for the bubble to be read, then move RIGHT
            setTimeout(() => {
                document.getElementById('expertContainer').classList.add('expert-exit-right');
            }, 1200);

            // Redirect after the animation finishes
            setTimeout(() => {
                window.location.href = url;
            }, 5000);
        }
    </script>
</body>
</html>
